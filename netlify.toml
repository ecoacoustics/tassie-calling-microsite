[build.environment]
GO_VERSION = "1.24.2"
HUGO_VERSION = "0.147.9"
NODE_VERSION = "22"

[build]
publish = "public"
command = "git config core.quotepath false && hugo --gc --minify"

# Content Security Policy notes:
# - 'unsafe-inline' in script-src is required because Hugo generates inline
#   <script> blocks with template content (e.g. siteParams). Static sites
#   cannot use nonces, and the inline content is config-dependent so hashes
#   are fragile.
# - 'unsafe-inline' in style-src is required for inline <style> blocks in
#   templates and style attributes used by shortcodes and web components.
# - cdn.jsdelivr.net serves Shoelace UI components, ecoacoustics web
#   components, and Shoelace's SVG icons (fetched at runtime).
# - fonts.googleapis.com serves the Google Fonts CSS; fonts.gstatic.com
#   serves the actual font files.
# - www.googletagmanager.com / www.google-analytics.com are for optional
#   Google Analytics 4 support (disabled by default).
# - *.ecosounds.org and *.acousticobservatory.org cover all API subdomains
#   across environments (staging, production, etc.).
[[headers]]
  for = "/*"
    [headers.values]
    Access-Control-Allow-Origin = "*"
    Cross-Origin-Opener-Policy = "same-origin"
    Cross-Origin-Embedder-Policy = "require-corp"
    Content-Security-Policy-Report-Only = "default-src 'self'; script-src 'self' 'unsafe-eval' 'unsafe-inline' https://cdn.jsdelivr.net https://www.googletagmanager.com; style-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:; connect-src 'self' data: https://*.ecosounds.org https://*.acousticobservatory.org https://cdn.jsdelivr.net https://www.google-analytics.com; media-src 'self' https://*.ecosounds.org https://*.acousticobservatory.org; frame-src 'none'; worker-src 'self' blob:; object-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'none';"
